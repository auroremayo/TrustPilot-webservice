version: '3.8'

services:
  # 1. Ton moteur FastAPI
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./users.json:/app/users.json

  # 2. Le Vigile Nginx
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

  # 3. Ton Interface Streamlit (LE NOUVEAU !)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501" # Le port standard de Streamlit
    depends_on:
      - nginx